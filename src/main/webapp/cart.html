<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - FoodieExpress</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <i class="fas fa-utensils me-2"></i>FoodieExpress
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html"><i class="fas fa-home me-1"></i>Home</a>
                    <a class="nav-link" href="menu.html"><i class="fas fa-list me-1"></i>Menu</a>
                    <a class="nav-link active" href="cart.html"><i class="fas fa-shopping-cart me-1"></i>Cart</a>
                    <a class="nav-link" href="order-status.html"><i class="fas fa-clipboard-list me-1"></i>Orders</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Cart Section -->
    <section class="cart-section py-5 mt-5">
        <div class="container">
            <div class="row">
                <div class="col-lg-8">
                    <div class="d-flex align-items-center mb-5">
                        <i class="fas fa-shopping-cart fa-3x text-orange me-4"></i>
                        <div>
                            <h1 class="display-5 fw-bold mb-1">Your Cart</h1>
                            <p class="lead text-muted mb-0" id="cartItemCount">2 items</p>
                        </div>
                    </div>

                    <!-- Cart Items -->
                    <div id="cartItemsContainer">
                        <!-- Cart items populated by script.js -->
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            Your cart is empty. <a href="menu.html" class="text-orange fw-bold">Continue Shopping →</a>
                        </div>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="col-lg-4">
                    <div class="card sticky-top shadow-lg border-0" style="top: 20px;">
                        <div class="card-header bg-gradient-orange text-white">
                            <h4 class="mb-0 fw-bold">
                                <i class="fas fa-receipt me-2"></i>Order Summary
                            </h4>
                        </div>
                        <div class="card-body">
                            <div class="d-flex justify-content-between mb-3">
                                <span>Subtotal:</span>
                                <span id="subtotal">₹0</span>
                            </div>
                            <div class="d-flex justify-content-between mb-3">
                                <span>Tax (5%):</span>
                                <span id="tax">₹0</span>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between mb-4 fs-5 fw-bold">
                                <span>Total:</span>
                                <span id="grandTotal" class="text-orange">₹0</span>
                            </div>
                            
                            <!-- Delivery Address -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">Delivery Address</label>
                                <textarea class="form-control border-orange" id="deliveryAddress" rows="3" placeholder="Enter your delivery address"></textarea>
                            </div>

                            <!-- Place Order Button -->
                            <button onclick="placeOrder()" class="btn btn-orange btn-lg w-100 py-3 fw-bold shadow-lg" id="placeOrderBtn" disabled>
                                <i class="fas fa-credit-card me-2"></i>
                                Place Order ₹<span id="orderTotal">0</span>
                            </button>
                            
                            <div class="text-center mt-3">
                                <small class="text-muted">Secure payment. Free delivery over ₹200</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Auto load cart on page load
        window.addEventListener('load', loadCartPage);
    </script>

</body>
</html>
