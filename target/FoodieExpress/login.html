<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FoodieExpress</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <i class="fas fa-utensils me-2"></i>FoodieExpress
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html"><i class="fas fa-home me-1"></i>Home</a>
                <a class="nav-link" href="menu.html"><i class="fas fa-list me-1"></i>Menu</a>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section class="login-section min-vh-100 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-xl-5">
                    <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                        <div class="row g-0">
                            <!-- Left Image Side -->
                            <div class="col-md-6">
                                <div class="login-img h-100 bg-gradient-orange p-5 d-flex align-items-center">
                                    <div>
                                        <h2 class="text-white fw-bold mb-3">Welcome Back!</h2>
                                        <p class="text-white-50 mb-0">Order your favorite food in minutes</p>
                                    </div>
                                </div>
                            </div>
                            <!-- Right Form Side -->
                            <div class="col-md-6 p-5">
                                <div class="text-center mb-4">
                                    <i class="fas fa-utensils fa-3x text-orange mb-3"></i>
                                    <h3 class="fw-bold text-dark mb-1">Sign In</h3>
                                    <p class="text-muted">Enter your credentials to continue</p>
                                </div>

                                <!-- Login Form -->
                                <form action="/FoodieExpress/user" method="POST">
                                    <input type="hidden" name="action" value="login">

                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="form-label fw-bold">Email</label>
                                            <div class="input-group input-group-lg">
                                                <span class="input-group-text bg-white border-orange">
                                                    <i class="fas fa-envelope text-orange"></i>
                                                </span>
                                                <input type="email" class="form-control border-orange shadow-sm" name="email" placeholder="your@email.com" required>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label fw-bold">Password</label>
                                            <div class="input-group input-group-lg">
                                                <span class="input-group-text bg-white border-orange">
                                                    <i class="fas fa-lock text-orange"></i>
                                                </span>
                                                <input type="password" class="form-control border-orange shadow-sm" name="password" placeholder="••••••••" required>
                                            </div>
                                        </div>
                                    </div>

                                    <button type="submit" class="btn btn-orange btn-lg w-100 fw-bold py-3 shadow-lg">
                                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                                    </button>
                                </form>

                                <div class="text-center mt-4">
                                    <p class="mb-0 text-muted">Don't have an account?</p>
                                    <a href="register.html" class="btn btn-link text-decoration-none fw-bold text-orange">
                                        <i class="fas fa-user-plus me-1"></i>Create Account
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
