<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FoodieExpress</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --orange: #ff6b35;
            --orange-dark: #f7931e;
            --gradient: linear-gradient(135deg, var(--orange), var(--orange-dark));
        }
        body { font-family: 'Poppins', sans-serif; }
        .bg-gradient-orange { background: var(--gradient); }
        .border-orange { border-color: var(--orange) !important; }
    </style>
</head>
<body class="min-vh-100 d-flex align-items-center">
    <section class="login-section w-100">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8 col-xl-6">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="login-img h-100 bg-gradient-orange p-5 d-flex align-items-center">
                                <div>
                                    <h1 class="display-4 fw-bold text-white mb-3">
                                        <i class="fas fa-utensils me-3"></i>Welcome to FoodieExpress
                                    </h1>
                                    <p class="lead text-white-50 mb-0">Create your account to start ordering delicious food!</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="p-5">
                                <div class="text-center mb-5">
                                    <h2 class="fw-bold mb-2">Create Account</h2>
                                    <p class="text-muted">Join FoodieExpress today!</p>
                                </div>
                                <form action="/FoodieExpress/user" method="POST">
                                    <input type="hidden" name="action" value="register">
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Full Name</label>
                                        <div class="input-group input-group-lg">
                                            <span class="input-group-text bg-white border-orange">
                                                <i class="fas fa-user text-orange"></i>
                                            </span>
                                            <input type="text" class="form-control border-orange shadow-sm" name="name" placeholder="John Doe" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Email</label>
                                        <div class="input-group input-group-lg">
                                            <span class="input-group-text bg-white border-orange">
                                                <i class="fas fa-envelope text-orange"></i>
                                            </span>
                                            <input type="email" class="form-control border-orange shadow-sm" name="email" placeholder="your@email.com" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Password</label>
                                        <div class="input-group input-group-lg">
                                            <span class="input-group-text bg-white border-orange">
                                                <i class="fas fa-lock text-orange"></i>
                                            </span>
                                            <input type="password" class="form-control border-orange shadow-sm" name="password" placeholder="••••••••" required>
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-orange w-100 py-3 fs-5 fw-bold mb-3">
                                        <i class="fas fa-user-plus me-2"></i>Create Account
                                    </button>
                                </form>
                                <div class="text-center">
                                    <p class="mb-0 text-muted">Already have an account?</p>
                                    <a href="login.html" class="btn btn-link text-decoration-none fw-bold text-orange">
                                        <i class="fas fa-sign-in-alt me-1"></i>Login
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
